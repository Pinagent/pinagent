# Cloudflare Workers config for the Pinagent hosted relay.
#
# Deploy:  pnpm --filter @pinagent/ee-relay deploy
# Local:   pnpm --filter @pinagent/ee-relay dev:worker
#
# Env vars are sourced from Doppler (the source of truth), NOT committed here.
# The full key list lives in `.dev.vars.example`.
#   Local:  doppler secrets download --no-file --format env --config dev > .dev.vars
#           (wrangler dev reads .dev.vars; it does NOT read process.env)
#   Prod:   doppler secrets download --no-file --format env --config prd \
#             | wrangler secret bulk --name pinagent-relay
#
# RELAY_INTERNAL_SECRET + PINAGENT_CONTROL_PLANE_URL (the cloud app base URL)
# gate lifecycle reporting: when both are set the Durable Object POSTs
# connect/disconnect to {url}/internal/relay/events; unset → reporting is a no-op.
#
# Production MUST set RELAY_AUTH_SECRET. With no auth secret the worker fails
# closed (500) unless RELAY_ALLOW_INSECURE is explicitly truthy — the insecure
# "accept any token" dev-fallback is opt-in only, never the default. `dev:worker`
# passes RELAY_ALLOW_INSECURE for frictionless local relay testing; never set it
# on a real deploy.
name = "pinagent-relay"
main = "src/worker.ts"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]

# One Durable Object class — `RelaySession` holds the live sockets for a
# single tenant session and routes between them.
[[durable_objects.bindings]]
name = "RELAY"
class_name = "RelaySession"

# SQLite-backed Durable Objects (required for new classes; also the only
# tier that supports the free plan).
[[migrations]]
tag = "v1"
new_sqlite_classes = ["RelaySession"]
