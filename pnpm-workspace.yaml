packages:
  - 'packages/*'
  - 'ee/packages/*'
  - 'apps/*'
  - 'examples/*'
  # Standalone Expo demo — kept OUT of the workspace so its Expo/RN 0.74 (React 18.2)
  # deps never enter the React 19 root lockfile. It installs its own tree with npm.
  - '!examples/expo-app'
allowBuilds:
  '@biomejs/biome': true
  better-sqlite3: true
  esbuild: true
  sharp: true
onlyBuiltDependencies:
  - '@biomejs/biome'
  - better-sqlite3
  - esbuild
  - sharp
# Fail install when a declared peer dependency is unmet. Catches the
# class of drift where (e.g.) an upstream SDK bumps its zod peer to ^4
# and our packages keep declaring ^3 — previously this surfaced only
# as a warning a developer could miss, and we shipped a broken peer
# version to npm. With this on, every `pnpm install` is also a peer-dep
# lint pass. Surface the equivalent script as `lint:peer-deps`.
strictPeerDependencies: true
