# Cloudflare Workers config for the Pinagent cloud control plane.
#
# Deploy:  pnpm --filter @pinagent/cloud deploy
# Local:   pnpm --filter @pinagent/cloud dev:worker
#
# Env vars are sourced from Doppler (the source of truth), NOT committed here.
# The full key list + required/optional split + which are secrets lives in
# `.dev.vars.example`.
#   Local:  doppler secrets download --no-file --format env --config dev > .dev.vars
#           (wrangler dev reads .dev.vars; it does NOT read process.env)
#   Prod:   doppler secrets download --no-file --format env --config prd \
#             | wrangler secret bulk --name pinagent-cloud
name = "pinagent-cloud"
main = "src/worker.ts"
compatibility_date = "2026-05-01"
# Neon serverless driver pulls in Node built-ins (e.g. crypto/stream shims).
compatibility_flags = ["nodejs_compat"]

# Daily billing-period rollover — the Worker's `scheduled()` handler advances
# every subscription whose period has elapsed (resets usage/quota windows).
[triggers]
crons = ["0 0 * * *"]
