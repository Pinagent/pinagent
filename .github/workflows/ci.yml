name: CI

# Run on every PR and on direct pushes to main. We don't run on tags
# or other branches — those exist for release tooling, not validation.
on:
  pull_request:
  push:
    branches: [main]

# Cancel in-progress runs when a new commit lands on the same branch
# (PRs only — keep main runs around for the audit log).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

# Read-only checkout is all we need; explicit so a compromised dep
# can't accidentally push to the repo.
permissions:
  contents: read

jobs:
  ci:
    name: typecheck · test · build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # pnpm comes BEFORE Node so setup-node's `cache: 'pnpm'` can find
      # the pnpm CLI. Version pinned to match packageManager in
      # package.json — otherwise corepack/setup-node may resolve a
      # different version than the developer uses locally.
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.14.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      # `--frozen-lockfile` fails the run if pnpm-lock.yaml is out of
      # date with package.json — catches PRs that bump a dep but forget
      # to commit the lockfile.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Sherif checks for cross-workspace version drift (e.g. two
      # packages on different `better-sqlite3` majors). Cheap (<1s)
      # and reads only package.json, so we run it right after install
      # for fail-fast — keeps reviewers from wasting time on a typecheck
      # green light that hides version-mismatch landmines.
      - name: Lint dependencies (sherif)
        run: pnpm lint:deps

      # SPDX header enforcement: every source file under packages/,
      # ee/packages/, apps/cli, apps/cloud must declare its license
      # on the first line. Apache-2.0 for OSS trees, Elastic-2.0 for
      # ee/ and apps/cloud. Generated files (__generated__/) are
      # exempt because they're rewritten by the build.
      - name: Lint SPDX headers
        run: pnpm lint:spdx

      # Max-lines check: source files (.ts/.tsx/.js/.jsx/.mjs/.cjs/.css)
      # must stay under 1000 lines to keep modules reviewable. Generated
      # files (__generated__/, *.d.ts, dist/) are exempt. A short allowlist
      # in scripts/check-max-lines.mjs grandfathers in files that predate
      # the cap — split them and remove the entry, don't add new ones.
      - name: Lint max lines
        run: pnpm lint:max-lines

      # Workspace-deps check: every @pinagent/* entry in a package's
      # `dependencies` must be imported by at least one file in src/,
      # tests/, scripts/, or *.config.*. Catches stale runtime
      # declarations left behind by refactors. devDependencies are
      # intentionally skipped — they're often declared for tsdown
      # bundling or build-time consumption via filesystem path, and
      # don't ship to downstream installs anyway.
      - name: Lint workspace deps
        run: pnpm lint:workspace-deps

      # Undeclared-imports check (inverse of the above): every
      # @pinagent/* import in a package's source must correspond to a
      # declaration in its package.json (dependencies, devDependencies,
      # or peerDependencies). The monorepo's hoisted node_modules
      # makes undeclared workspace imports "work" locally, but they
      # fail to resolve for downstream consumers of the published
      # tarball. Catches the class of bug where a concurrent PR adds
      # an import but the matching dep declaration gets lost in a
      # rebase/auto-merge.
      - name: Lint undeclared imports
        run: pnpm lint:undeclared-imports

      # Peer-dep drift check: fail on any unmet peer dependency. Without
      # this, an upstream SDK bumping its peer (e.g. claude-agent-sdk
      # going zod ^3 → ^4) only surfaced as an install-time warning a
      # developer could miss. `strictPeerDependencies` in
      # pnpm-workspace.yaml makes every install enforce this — the
      # explicit lint step here is a fast standalone re-check.
      - name: Lint peer deps
        run: pnpm lint:peer-deps

      # Widget cascade: @pinagent/widget is embedded into next-plugin
      # and vite-plugin at build time, so widget code changes must
      # ship via a changeset that bumps both consumers. PR-only —
      # post-merge pushes to main don't have a useful base to diff
      # against, and the gate has already gated the merge by then.
      # We fetch the base ref first because actions/checkout does a
      # shallow clone and our script needs `origin/<base>` to resolve.
      - name: Lint widget cascade
        if: github.event_name == 'pull_request'
        run: |
          git fetch --no-tags --depth=50 origin ${{ github.base_ref }}
          pnpm lint:widget-cascade

      # Biome lint + format. Runs before typecheck because it's the
      # cheapest signal (~30ms) and surfaces the broadest class of
      # issues. A failure here means an autofixable problem the dev
      # can resolve with `pnpm exec biome check --write .`.
      - name: Lint (biome)
        run: pnpm lint

      # `pnpm -r typecheck` runs tsc --noEmit across every package in
      # the workspace. The widget IIFE, the Next adapter, the MCP
      # server, and the shared db schema all go through their own
      # tsconfigs.
      - name: Typecheck
        run: pnpm typecheck

      # Unit + integration tests via Vitest, with a v8 coverage summary
      # printed to the run log. better-sqlite3's native binding gets
      # compiled at `pnpm install` time (allowed by pnpm-workspace.yaml's
      # `onlyBuiltDependencies`); the WS server tests bind 127.0.0.1:53700
      # which is unused on Actions runners. Coverage is reporting-only —
      # no thresholds are enforced (see vitest.config.ts), so this step
      # fails only on a real test failure, never on a coverage dip.
      - name: Test
        run: pnpm test:coverage

      # Build last so a green test run still catches packaging
      # regressions (tsdown config, embed-widget script, exports map).
      - name: Build
        run: pnpm build

      # Smoke-test the OSS-only filter that `release` uses
      # (`pnpm build:oss && changeset publish`). After the full `pnpm
      # build` above this is a near-instant turbo cache hit — its job
      # is to catch a stale `--filter` glob, so the release path stays
      # buildable without waiting for release day to find out.
      - name: Build (OSS filter)
        run: pnpm build:oss
